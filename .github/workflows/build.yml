name: Build TJAPlayer3

on:
  workflow_dispatch: # 사용자가 원할 때 수동으로 빌드를 실행하는 옵션

jobs:
  build:
    runs-on: windows-latest # Visual Studio 2017/2019 환경 제공

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore TJAPlayer3.sln # 솔루션 파일 이름이 다르면 수정이 필요할 수 있습니다.

    - name: Build Solution
      run: msbuild TJAPlayer3.sln /p:Configuration=Release /p:Platform="x86" /p:SignAssembly=false

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TJAPlayer3-Release
        path: |
          **/bin/Release/
          **/bin/x86/Release/
